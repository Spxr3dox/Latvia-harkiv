<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">

<title>Honorary Consulate of the Republic of Latvia in Kharkiv</title>
<meta name="description" content="Official website of the Honorary Consulate of the Republic of Latvia in Kharkiv — a digital platform of Latvian–Ukrainian cooperation.">
<style>
  :root{
    --brand-50:#eef3fb; --brand-500:#4272bd; --brand-600:#1e4d8f; --brand-700:#14396b;
    --ink:#0f1c2e; --ink-soft:#2b3a52; --ink-muted:#5c6b83;
    --surface:#ffffff; --surface-alt:#f4f7fc; --border:#dbe4f0;
    --content:1200px;
    --radius-sm:8px; --radius:14px; --radius-lg:20px; --radius-xl:28px;
    --shadow-sm:0 1px 2px rgba(20,57,107,.06);
    --shadow:0 4px 18px -6px rgba(20,57,107,.12);
    --shadow-lg:0 20px 40px -20px rgba(20,57,107,.25);
    --font-sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Ubuntu,sans-serif;
    --font-display:'Fraunces',Georgia,'Times New Roman',serif;
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:var(--font-sans); background:var(--surface); color:var(--ink);
    -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
    font-size:16px; line-height:1.55;
  }
  h1,h2,h3,h4{font-family:var(--font-display); letter-spacing:-.01em; font-weight:600; margin:0}
  h1{font-size:clamp(2rem,4.5vw,3.75rem); line-height:1.05}
  h2{font-size:clamp(1.5rem,3vw,2.25rem); line-height:1.15}
  h3{font-size:1.25rem; line-height:1.25}
  p{margin:0}
  a{color:inherit; text-decoration:none}
  img,svg{display:block; max-width:100%}
  button{font:inherit; cursor:pointer; border:0; background:none; color:inherit}
  ul{margin:0; padding:0; list-style:none}
  ::selection{background:var(--brand-600); color:#fff}
  :focus-visible{outline:2px solid var(--brand-600); outline-offset:2px; border-radius:2px}
  hr{border:0; border-top:1px solid var(--border); margin:0}

  .container{max-width:var(--content); margin:0 auto; padding:0 20px}
  @media(min-width:768px){ .container{padding:0 32px} }

  .flag-stripe{display:flex; flex-direction:column}
  .flag-stripe>div:nth-child(1),.flag-stripe>div:nth-child(3){height:6px; background:var(--brand-600)}
  .flag-stripe>div:nth-child(2){height:3px; background:#fff}

  .kicker{display:inline-flex; align-items:center; gap:8px; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.18em; color:var(--brand-700)}
  .kicker::before{content:""; display:inline-block; width:22px; height:2px; background:currentColor; border-radius:2px}

  .btn{display:inline-flex; align-items:center; gap:8px; padding:12px 22px; font-size:14px; font-weight:600; transition:.18s ease; border:1px solid transparent; cursor:pointer; border-radius:999px}
  .btn-primary{background:var(--brand-600); color:#fff; box-shadow:var(--shadow-sm)}
  .btn-primary:hover{background:var(--brand-700); box-shadow:var(--shadow); transform:translateY(-1px)}
  .btn-outline{border-color:var(--brand-600); color:var(--brand-600); background:transparent}
  .btn-outline:hover{background:var(--brand-600); color:#fff}
  .btn-ghost{color:var(--brand-700); font-weight:600; font-size:14px}
  .btn-ghost:hover{color:var(--brand-500)}

  .card{display:block; padding:28px; background:#fff; border:1px solid var(--border); border-radius:var(--radius-lg); transition:.2s ease; box-shadow:var(--shadow-sm)}
  .card:hover{border-color:var(--brand-500); box-shadow:var(--shadow-lg); transform:translateY(-3px)}
  .divider-red{height:3px; width:48px; background:var(--brand-600); border-radius:2px}
  .tag{display:inline-block; font-size:10px; font-weight:600; letter-spacing:.15em; text-transform:uppercase; background:var(--brand-50); color:var(--brand-700); padding:6px 12px; border-radius:999px}
  .chip{display:inline-block; font-size:11px; letter-spacing:.1em; text-transform:uppercase; border:1px solid var(--border); padding:6px 12px; color:var(--ink-soft); border-radius:999px}

  header.site{position:sticky; top:0; z-index:40; background:rgba(255,255,255,.96); backdrop-filter:blur(6px); border-bottom:1px solid var(--border)}
  .header-row{display:flex; align-items:center; gap:16px; padding:16px 0}
  .brand{display:flex; align-items:center; gap:12px}
  .brand-mark{width:44px; height:44px; flex-shrink:0}
  .brand-text .t1{font-family:var(--font-display); font-size:15px; font-weight:600}
  .brand-text .t2{font-size:11px; text-transform:uppercase; letter-spacing:.15em; color:var(--ink-muted); margin-top:2px}
  .lang-switch{display:flex; gap:4px; margin-left:auto; background:var(--surface-alt); padding:4px; border-radius:999px}
  .menu-toggle{display:none; width:40px; height:40px; align-items:center; justify-content:center; border-radius:var(--radius-sm)}
  .menu-toggle:hover{background:var(--brand-50)}
  .menu-toggle span{display:block; height:2px; width:22px; background:var(--ink); margin:3px 0; transition:.2s; border-radius:2px}
  .menu-toggle.open span:nth-child(1){transform:translateY(8px) rotate(45deg)}
  .menu-toggle.open span:nth-child(2){opacity:0}
  .menu-toggle.open span:nth-child(3){transform:translateY(-8px) rotate(-45deg)}
  .lang-switch button{padding:6px 12px; font-size:12px; font-weight:600; letter-spacing:.1em; color:var(--ink-muted); border-radius:999px; transition:.15s}
  .lang-switch button.active{color:#fff; background:var(--brand-600)}
  .lang-switch button:not(.active):hover{color:var(--brand-700); background:var(--brand-50)}
  nav.primary{display:flex; align-items:center; gap:8px; padding-bottom:14px; overflow-x:auto; font-size:13px; font-weight:500}
  nav.primary::-webkit-scrollbar{display:none}
  nav.primary a{white-space:nowrap; padding:8px 14px; border-radius:999px; color:var(--ink-soft); transition:.15s}
  nav.primary a:hover{color:var(--brand-700); background:var(--brand-50)}
  nav.primary a.active{color:#fff; background:var(--brand-600)}
  @media(max-width:1023px){
    .menu-toggle{display:flex}
    nav.primary{display:none}
    nav.primary.mobile-open{display:flex; flex-direction:column; align-items:stretch; gap:4px; padding:8px 0 20px}
    nav.primary.mobile-open a{padding:12px 14px; border-radius:var(--radius)}
  }

  section.hero{position:relative; overflow:hidden}
  .hero-bg{position:absolute; inset:0; z-index:-1; opacity:.07; background:
    radial-gradient(circle at 90% 0%, #1e4d8f 0%, transparent 45%),
    radial-gradient(circle at 0% 100%, #4272bd 0%, transparent 40%)}
  .hero-grid{display:grid; grid-template-columns:1fr; gap:40px; padding:64px 0}
  @media(min-width:1024px){ .hero-grid{grid-template-columns:2fr 1fr; padding:96px 0} }
  .hero-cta{display:flex; gap:12px; flex-wrap:wrap; margin-top:32px}
  .hero-lead{font-size:clamp(1.05rem,1.6vw,1.25rem); color:var(--ink-soft); margin-top:24px; max-width:640px; line-height:1.6}
  aside.hero-side{background:var(--surface-alt); padding:28px; border-radius:var(--radius-lg); border:1px solid var(--border)}
  @media(max-width:1023px){ aside.hero-side{padding:24px} }
  aside.hero-side .label{font-size:11px; text-transform:uppercase; letter-spacing:.15em; color:var(--brand-700); font-weight:600}
  aside.hero-side ul{margin-top:16px; display:flex; flex-direction:column; gap:8px}
  aside.hero-side ul li{display:flex; align-items:center; gap:8px; font-size:14px; color:var(--ink-soft)}
  aside.hero-side ul li::before{content:""; width:6px; height:6px; background:var(--brand-600); border-radius:999px}

  .welcome{background:var(--surface-alt)}
  .welcome-grid{display:grid; grid-template-columns:1fr; gap:40px; padding:64px 0}
  @media(min-width:768px){ .welcome-grid{grid-template-columns:1fr 2fr; padding:80px 0} }
  .welcome-photo{width:180px; height:180px; background:#fff; border:1px solid var(--border); border-radius:24px; display:flex; align-items:center; justify-content:center; font-size:11px; color:var(--ink-muted); text-align:center; padding:16px; box-shadow:var(--shadow)}
  .welcome-quote{font-family:var(--font-display); font-size:clamp(1.35rem,2.5vw,1.875rem); line-height:1.35; margin-top:24px; color:var(--ink)}

  .grid-2{display:grid; grid-template-columns:1fr; gap:24px}
  @media(min-width:768px){ .grid-2{grid-template-columns:repeat(2,1fr)} }
  .grid-3{display:grid; grid-template-columns:1fr; gap:24px}
  @media(min-width:768px){ .grid-3{grid-template-columns:repeat(2,1fr)} }
  @media(min-width:1024px){ .grid-3{grid-template-columns:repeat(3,1fr)} }
  .grid-4{display:grid; grid-template-columns:1fr; gap:16px}
  @media(min-width:640px){ .grid-4{grid-template-columns:repeat(2,1fr)} }
  @media(min-width:1024px){ .grid-4{grid-template-columns:repeat(4,1fr)} }

  .highlights{padding:64px 0 80px}
  .highlight-icon{color:var(--brand-600); font-family:var(--font-display); font-size:28px; line-height:1}
  .highlight-title{margin-top:16px; font-family:var(--font-display); font-size:18px; font-weight:600}
  .highlight-text{margin-top:8px; font-size:14px; color:var(--ink-muted); line-height:1.55}
  .highlight-cta{margin-top:16px; font-size:14px; font-weight:600; color:var(--brand-700)}

  .news-section{border-top:1px solid var(--border); padding:64px 0}
  .news-grid{display:grid; gap:48px; grid-template-columns:1fr}
  @media(min-width:1024px){ .news-grid{grid-template-columns:2fr 1fr} }
  .news-item{display:grid; grid-template-columns:1fr; gap:8px; padding:24px 0; border-top:1px solid var(--border)}
  .news-item:first-of-type{border-top:0}
  @media(min-width:768px){ .news-item{grid-template-columns:120px 1fr; gap:24px} }
  .news-date{font-size:13px; color:var(--ink-muted)}
  .news-title{font-family:var(--font-display); font-size:18px; font-weight:600; color:var(--ink)}
  .news-excerpt{margin-top:8px; font-size:14px; color:var(--ink-soft)}
  .events-list{margin-top:32px; display:flex; flex-direction:column; gap:24px}
  .event-item{border-left:3px solid var(--brand-600); padding:4px 0 4px 16px; border-radius:2px}
  .event-meta{font-size:11px; text-transform:uppercase; letter-spacing:.15em; color:var(--ink-muted)}
  .event-title{margin-top:4px; font-family:var(--font-display); font-weight:600}

  .quick{background:linear-gradient(180deg, var(--brand-700), var(--ink)); color:#fff}
  .quick-inner{padding:64px 0 80px}
  .quick-grid{margin-top:32px; display:grid; gap:20px; grid-template-columns:1fr}
  @media(min-width:640px){ .quick-grid{grid-template-columns:repeat(2,1fr)} }
  @media(min-width:1024px){ .quick-grid{grid-template-columns:repeat(4,1fr)} }
  .quick-item{display:block; padding:28px; border:1px solid rgba(255,255,255,.14); border-radius:var(--radius-lg); background:rgba(255,255,255,.03); transition:.2s}
  .quick-item:hover{border-color:rgba(255,255,255,.4); background:rgba(255,255,255,.08); transform:translateY(-3px)}
  .quick-item .t1{font-family:var(--font-display); font-weight:600}
  .quick-item .t2{margin-top:8px; font-size:13px; color:rgba(255,255,255,.7)}
  .quick-item .t3{margin-top:16px; font-size:11px; text-transform:uppercase; letter-spacing:.15em; color:#a4c2eb}

  .contact-strip{padding:64px 0 80px}
  .contact-strip-box{display:grid; grid-template-columns:1fr; gap:24px; align-items:center; padding:36px; border:1px solid var(--border); border-radius:var(--radius-xl); background:linear-gradient(135deg, var(--surface-alt), #fff); box-shadow:var(--shadow)}
  @media(min-width:768px){ .contact-strip-box{grid-template-columns:1fr auto; padding:56px} }

  .page-header{background:var(--surface-alt); border-bottom:1px solid var(--border); padding:64px 0}
  @media(min-width:768px){ .page-header{padding:96px 0} }
  .page-header .lead{font-size:1.1rem; color:var(--ink-soft); margin-top:24px; max-width:640px; line-height:1.6}

  .footer-wrap{margin-top:96px; background:var(--surface-alt); border-top:1px solid var(--border); border-top-left-radius:32px; border-top-right-radius:32px; overflow:hidden}
  .footer-inner{padding:56px 0}
  .footer-grid{display:grid; gap:40px; grid-template-columns:1fr}
  @media(min-width:768px){ .footer-grid{grid-template-columns:1.4fr 1fr 1fr 1fr} }

  .footer-col a:hover{color:var(--brand-700)}
  .footer-legal{display:flex; flex-direction:column; gap:12px; justify-content:space-between; padding-top:24px; margin-top:48px; border-top:1px solid var(--border); font-size:12px; color:var(--ink-muted)}
  @media(min-width:768px){ .footer-legal{flex-direction:row; align-items:center} }
  .footer-legal .links{display:flex; gap:16px; flex-wrap:wrap}

  section.pad{padding:64px 0}
  .center-note{margin-top:32px; font-size:12px; color:var(--ink-muted); font-style:italic; max-width:720px}

  .do-dont{display:grid; grid-template-columns:1fr; gap:24px}
  @media(min-width:768px){ .do-dont{grid-template-columns:1fr 1fr} }
  .box-white{padding:36px; background:#fff; border:1px solid var(--border); border-radius:var(--radius-lg); box-shadow:var(--shadow-sm)}
  .box-dark{padding:36px; background:linear-gradient(135deg, var(--brand-700), var(--ink)); color:#fff; border-radius:var(--radius-lg); box-shadow:var(--shadow-lg)}
  .box-dark .kicker{color:#a4c2eb}

  .list-check{margin-top:24px; display:flex; flex-direction:column; gap:12px}
  .list-check li{display:flex; gap:12px}
  .list-check .m{color:var(--brand-600); margin-top:2px; font-weight:700; font-size:16px}
  .box-dark .list-check .m{color:#a4c2eb}
  .box-dark .list-check li{color:rgba(255,255,255,.85)}

  .emerg-band{background:linear-gradient(135deg, var(--brand-600), var(--brand-700)); color:#fff; padding:56px 0; border-radius:var(--radius-xl); margin:0 20px; box-shadow:var(--shadow-lg)}
  @media(min-width:768px){ .emerg-band{margin:0 32px} }
  .emerg-band .grid{display:grid; grid-template-columns:1fr; gap:24px; align-items:center; padding:0 4px}
  @media(min-width:768px){ .emerg-band .grid{grid-template-columns:2fr 1fr} }
  .emerg-btn{display:inline-flex; align-items:center; justify-content:center; padding:14px 22px; background:#fff; color:var(--brand-700); font-weight:600; border:1px solid #fff; border-radius:999px; transition:.18s}
  .emerg-btn:hover{background:transparent; color:#fff; transform:translateY(-1px)}

  details{padding:20px 24px; margin-bottom:12px; background:#fff; border:1px solid var(--border); border-radius:var(--radius); transition:.15s}
  details[open]{border-color:var(--brand-500); box-shadow:var(--shadow-sm)}
  summary{display:flex; align-items:center; justify-content:space-between; gap:16px; cursor:pointer; font-family:var(--font-display); font-size:18px; font-weight:600; list-style:none}
  summary::-webkit-details-marker{display:none}
  summary::after{content:"+"; color:var(--brand-600); font-size:24px; line-height:1; transition:.2s; width:32px; height:32px; display:inline-flex; align-items:center; justify-content:center; background:var(--brand-50); border-radius:999px}
  details[open] summary::after{transform:rotate(45deg)}
  details p{margin-top:12px; color:var(--ink-soft); line-height:1.6}

  form.contact-form{display:grid; gap:16px; margin-top:24px}
  form.contact-form .row-2{display:grid; gap:16px; grid-template-columns:1fr}
  @media(min-width:640px){ form.contact-form .row-2{grid-template-columns:1fr 1fr} }
  form.contact-form label{display:grid; gap:8px; font-size:14px; color:var(--ink-soft)}
  form.contact-form input, form.contact-form textarea{
    padding:12px 14px; border:1px solid var(--border); background:#fff; font:inherit; color:var(--ink); border-radius:var(--radius); transition:.15s;
  }
  form.contact-form textarea{border-radius:var(--radius-sm)}
  form.contact-form input:focus, form.contact-form textarea:focus{border-color:var(--brand-600); outline:none; box-shadow:0 0 0 3px rgba(30,77,143,.15)}

  .link-underline{text-decoration:underline; text-decoration-color:var(--brand-600); text-decoration-thickness:2px; text-underline-offset:4px}
  .link-underline:hover{color:var(--brand-700)}

  .event-row{display:grid; gap:16px; grid-template-columns:1fr; padding:24px; margin-bottom:16px; background:#fff; border:1px solid var(--border); border-radius:var(--radius-lg); transition:.2s}
  .event-row:hover{border-color:var(--brand-500); box-shadow:var(--shadow); transform:translateY(-2px)}
  @media(min-width:768px){ .event-row{grid-template-columns:200px 1fr; gap:32px; padding:32px} }
  .event-row .date{font-family:var(--font-display); font-size:22px; font-weight:600; color:var(--brand-700)}
  .event-row .place{font-size:12px; text-transform:uppercase; letter-spacing:.15em; color:var(--ink-muted); margin-top:4px}

  .page{display:block}

  /* Global rounding for inline-styled boxes throughout render templates */
  [style*="border:1px solid var(--border)"]{ border-radius:var(--radius-lg); box-shadow:var(--shadow-sm); transition:.2s ease }
  a[style*="border:1px solid var(--border)"]:hover,
  article[style*="border:1px solid var(--border)"]:hover,
  li[style*="border:1px solid var(--border)"]:hover,
  div[style*="border:1px solid var(--border)"]:hover{ border-color:var(--brand-500) !important; box-shadow:var(--shadow); transform:translateY(-2px) }
  /* Don't lift static content boxes on hover */
  section[style*="border:1px solid var(--border)"]:hover,
  div.contact-strip-box:hover,
  aside.hero-side:hover{ transform:none }
  aside.hero-side{ transition:.2s ease }
  /* Rounded corners on img/svg containers */
  img, .rounded{ border-radius:var(--radius) }
</style>
</head>

  consulate:{kicker:"About the Honorary Consulate",title:"Honorary Consulate of the Republic of Latvia in Kharkiv",lead:"The Honorary Consulate operates under the 1963 Vienna Convention on Consular Relations and the relevant instruments of the Ministry of Foreign Affairs of the Republic of Latvia.",
    history:{title:"History",body:"The Honorary Consulate was established to deepen bilateral relations between Latvia and Ukraine, in particular in the east of the country, and to assist Latvian citizens present within the consular district."},
    mission:{title:"Mission",body:"To protect the interests and dignity of the Republic of Latvia, to assist its citizens, and to develop economic, scientific, educational and cultural ties between Latvia and the Kharkiv region."},
    powers:{title:"Powers",body:"The scope of the Honorary Consulate's powers is defined by the Ministry of Foreign Affairs of the Republic of Latvia and by the Embassy of Latvia in Ukraine in accordance with the applicable law."},
    district:{title:"Consular district",body:"The activity of the Honorary Consulate covers the administrative units defined in the act establishing the Consulate.",oblasts:["Kharkiv Oblast","Poltava Oblast","Sumy Oblast"]},
    consul:{title:"The Honorary Consul",name:"Anton Semenov",role:"Honorary Consul of the Republic of Latvia in Kharkiv",bio:"Entrepreneur and public figure with many years of experience developing international economic and cultural ties. Appointed as Honorary Consul on the recommendation of the Ministry of Foreign Affairs of the Republic of Latvia."},
    team:{title:"The team",body:"In its daily work the Consulate is supported by a small team of professionals.",roles:[{name:"Chancery",role:"General enquiries and correspondence"},{name:"Consular affairs",role:"Assistance to citizens of Latvia"},{name:"Economic affairs",role:"Business Bridge, investment"},{name:"Cultural affairs",role:"Education and cultural programmes"}]},
    doTitle:"What the Honorary Consulate does",
    doList:["Provides assistance to citizens of the Republic of Latvia within the mandate defined by the Ministry of Foreign Affairs.","Facilitates deepening of bilateral economic, scientific, educational and cultural ties.","Supports visits by official delegations of the Republic of Latvia within the district.","Ensures the exchange of official information between Ukrainian institutions and the Embassy of Latvia.","Initiates and coordinates cultural and educational programmes promoting Latvia."],
    dontTitle:"What is NOT within its competence",
    dontList:["Issuance of visas, passports and other official documents — performed by the Embassy of Latvia in Ukraine.","Commercial intermediation on behalf of individual private companies.","Public endorsement or recommendation of specific legal entities or brands.","Decisions on granting citizenship, status or official permits.","Legal representation or the provision of legal services in its own interest."],
    legalNote:"The Honorary Consulate operates under the 1963 Vienna Convention and the instruments of the Ministry of Foreign Affairs of the Republic of Latvia. All powers are exercised under the supervision of the Embassy of Latvia in Ukraine."
  },
  consular:{kicker:"Consular information",title:"Assistance to citizens of Latvia and reference information",lead:"The Honorary Consulate provides basic consular assistance to citizens of the Republic of Latvia within its district. The full range of consular services is delivered by the Embassy of Latvia in Ukraine.",
    services:[
      {title:"Identification and contact with relatives",text:"Support for citizens in establishing contact with family or authorised persons."},
      {title:"Emergency return documents",text:"Assistance with obtaining a return document via the Embassy of Latvia in Ukraine."},
      {title:"Liaison with local authorities",text:"Facilitation with law enforcement, medical and administrative institutions."},
      {title:"Emergency situations",text:"Prompt support in situations threatening life or health."}
    ],
    emergencyBlock:{title:"Emergency contact",body:"For citizens of the Republic of Latvia who find themselves in an emergency situation within the district.",button:"emergency@latviakharkiv.org"},
    documents:{title:"Documents",body:"Documents to have with you when contacting the Consulate:",items:["Passport or ID card of a citizen of the Republic of Latvia","Documents confirming family relations (if applicable)","Medical documents (in the case of health-related assistance)","Copies of police reports (in the case of lost documents)"]},
    embassyRedirect:{title:"Embassy of the Republic of Latvia in Ukraine",body:"Visa matters, passport issuance, legalisation of documents and the full range of consular services are provided by the Embassy in Kyiv.",button:"Open www2.mfa.gov.lv"},
    faq:[
      {q:"Does the Honorary Consulate issue visas to Latvia?",a:"No. Visas are issued exclusively by the Embassy of Latvia in Ukraine and its accredited visa centres."},
      {q:"Can I apply for a passport at the Honorary Consulate?",a:"No. Passport services are provided by the Embassy of Latvia. The Honorary Consulate can help with information and referral."},
      {q:"What should I do if I lose my documents?",a:"Contact us immediately via the emergency e-mail. We will help you file a request to the Embassy of Latvia for a return document."},
      {q:"How do I book an appointment?",a:"Via the contact form or by writing to reception@latviakharkiv.org. Visits are by appointment only."}
    ]
  },

const $ = (s, c=document) => c.querySelector(s);
const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const el = (html) => { const t = document.createElement('template'); t.innerHTML = html.trim(); return t.content.firstElementChild; };

const STATE = {
  lang: (localStorage.getItem('lang') || (navigator.language||'').slice(0,2).toLowerCase()),
  route: 'home'
};
if(!['uk','en','lv'].includes(STATE.lang)) STATE.lang = 'uk';

const ROUTES = ['home','consulate','consular','latvia-kharkiv','business-bridge','innovation','investment','cooperation','events','media','resources','contact'];

// pushState works on http(s), not file://. On file:// we fall back to hash routing.
const USE_HISTORY = location.protocol === 'http:' || location.protocol === 'https:';

function routeToHref(route){
  return USE_HISTORY ? '/' + (route === 'home' ? '' : route) : '#/' + route;
}
function parseCurrentRoute(){
  let raw;
  if(USE_HISTORY){
    raw = location.pathname.replace(/^\//, '').split('/')[0] || 'home';
  } else {
    raw = (location.hash.replace(/^#\/?/, '') || 'home').split('/')[0];
  }
  return ROUTES.includes(raw) ? raw : 'home';
}

  'events': renderEvents,
  'media': renderMedia,
  'resources': renderResources,
  'contact': renderContact,
};

/* ============================================================
   Layout: header + main + footer
   ============================================================ */

/* ============================================================
   Boot / render / routing
   ============================================================ */
function rewriteInternalLinks(root){
  // Convert every href written as "#/route" into the current-mode href
  // and intercept clicks to use pushState when supported.
  root.querySelectorAll('a[href^="#/"]').forEach(a=>{
    const route = a.getAttribute('href').replace(/^#\//,'').split('/')[0];
    if(!ROUTES.includes(route)) return;
    a.setAttribute('href', routeToHref(route));
    a.dataset.internalRoute = route;
  });
  if(!USE_HISTORY) return;
  root.addEventListener('click', (e)=>{
    const a = e.target.closest('a[data-internal-route]');
    if(!a) return;
    if(e.metaKey || e.ctrlKey || e.shiftKey || e.button !== 0) return;
    e.preventDefault();
    navigateTo(a.dataset.internalRoute);
  });
}

function navigateTo(route){
  if(!ROUTES.includes(route)) route = 'home';
  const href = routeToHref(route);
  if(USE_HISTORY){
    if(location.pathname !== href) history.pushState({route}, '', href);
  } else {
    if(location.hash !== href) location.hash = href;
  }
  if(route !== STATE.route){
    STATE.route = route;
    render();
    window.scrollTo({top:0, behavior:'instant'});
  }
}

function render(){
  const d = DICT[STATE.lang];
  document.documentElement.lang = STATE.lang;
  document.title = d.meta.siteTitle;
  const app = document.getElementById('app');
  app.innerHTML = renderHeader(d, STATE.lang) + '<main>' + (RENDERERS[STATE.route] || renderHome)(d) + '</main>' + renderFooter(d);
  rewriteInternalLinks(app);
  // language switch
  app.querySelectorAll('.lang-switch button').forEach(b=>{
    b.addEventListener('click', ()=>{
      STATE.lang = b.dataset.lang;
      localStorage.setItem('lang', STATE.lang);
      render();
      window.scrollTo({top:0, behavior:'instant'});
    });
  });
  // mobile menu
  const toggle = document.getElementById('menuToggle');
  const nav = document.getElementById('primaryNav');
  if(toggle){
    toggle.addEventListener('click', ()=>{
      nav.classList.toggle('mobile-open');
      toggle.classList.toggle('open');
    });
  }
  nav.querySelectorAll('a').forEach(a=>a.addEventListener('click', ()=>{
    nav.classList.remove('mobile-open');
    if(toggle) toggle.classList.remove('open');
  }));
}

function handleRouteChange(){
  const r = parseCurrentRoute();
  if(r !== STATE.route){
    STATE.route = r;
    render();
    window.scrollTo({top:0, behavior:'instant'});
  } else {
    document.querySelectorAll('nav.primary a').forEach(a=>{
      a.classList.toggle('active', a.dataset.route === r);
    });
  }
}

window.addEventListener('popstate', handleRouteChange);
window.addEventListener('hashchange', handleRouteChange);
document.addEventListener('DOMContentLoaded', ()=>{
  STATE.route = parseCurrentRoute();
  render();
});
</script>
